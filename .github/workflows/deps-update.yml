name: Dependency Update

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dependency-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate token
        env:
          AUTO_UPDATE_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: |
          if [ -z "$AUTO_UPDATE_TOKEN" ]; then
            echo "::error::Missing AUTO_UPDATE_TOKEN secret"
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Update pnpm lockfile
        run: pnpm update --no-save --lockfile-only

      - name: Update Cargo lockfile
        run: cargo update
        working-directory: src-tauri

      - name: Install updated frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify frontend
        run: |
          pnpm lint
          pnpm typecheck

      - name: Verify backend
        run: cargo test
        working-directory: src-tauri

      - name: Commit changes
        id: commit
        run: |
          if git diff --quiet -- pnpm-lock.yaml src-tauri/Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml src-tauri/Cargo.lock
          git commit -m "chore: update dependencies"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push to main
        if: steps.commit.outputs.changed == 'true'
        env:
          AUTO_UPDATE_TOKEN: ${{ secrets.AUTO_UPDATE_TOKEN }}
        run: git push "https://x-access-token:${AUTO_UPDATE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
